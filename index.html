<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>StreamFlix</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <h1>StreamFlix</h1>

  <input 
    type="text" 
    placeholder="Search movies..." 
    onkeyup="debounceSearch(this.value)"
  >
</header>

<!-- SEARCH RESULTS -->
<section id="searchResults"></section>

<!-- TRENDING -->
<section class="row">
  <h2>Trending</h2>
  <div id="trending" class="movies"></div>
</section>

<!-- ACTION -->
<section class="row">
  <h2>Action</h2>
  <div id="action" class="movies"></div>
</section>

<!-- COMEDY -->
<section class="row">
  <h2>Comedy</h2>
  <div id="comedy" class="movies"></div>
</section>

<!-- TOP RATED -->
<section class="row">
  <h2>Top Rated</h2>
  <div id="toprated" class="movies"></div>
</section>

<!-- VIDEO PLAYER -->
<div id="player" class="player">
  <span class="close" onclick="closePlayer()">✖</span>
  <iframe 
    id="videoFrame" 
    frameborder="0" 
    allow="autoplay; encrypted-media" 
    allowfullscreen>
  </iframe>
</div>

<!-- SCRIPT -->
<script src="script.js"></script>

</body>
</html>

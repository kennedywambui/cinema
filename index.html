<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MovieFlix</title>

<style>
body {
  margin: 0;
  background: #141414;
  color: white;
  font-family: Arial;
}

/* NAV */
header {
  position: fixed;
  width: 100%;
  padding: 15px 20px;
  background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
  display: flex;
  justify-content: space-between;
  z-index: 100;
}

.logo {
  color: red;
  font-size: 26px;
  font-weight: bold;
}

.controls {
  display: flex;
  gap: 10px;
}

select, input {
  padding: 6px;
  background: black;
  color: white;
  border: 1px solid gray;
}

/* HERO */
.hero {
  height: 80vh;
  background-size: cover;
  background-position: center;
  display: flex;
  align-items: center;
  padding: 50px;
}

.hero h1 {
  font-size: 50px;
}

.hero button {
  padding: 10px 20px;
  border: none;
  margin-top: 10px;
  cursor: pointer;
  background: white;
  color: black;
}

/* ROW */
.row {
  padding-left: 20px;
  margin-top: 20px;
}

.row h2 {
  margin-bottom: 10px;
}

/* WRAPPER FOR ARROWS */
.row-wrapper {
  position: relative;
  display: flex;
  align-items: center;
}

.row-posters {
  display: flex;
  overflow-x: scroll;
  scroll-behavior: smooth;
}

.row-posters::-webkit-scrollbar {
  display: none;
}

/* POSTERS */
.poster-container {
  position: relative;
  margin-right: 10px;
}

.poster {
  width: 200px;
  transition: 0.3s;
}

.poster-container:hover .poster {
  transform: scale(1.3);
}

/* TOP 10 NUMBERS */
.rank {
  position: absolute;
  left: -10px;
  top: 20px;
  font-size: 80px;
  font-weight: bold;
  color: rgba(255,255,255,0.2);
}

/* HOVER INFO */
.hover-info {
  position: absolute;
  bottom: 0;
  background: rgba(0,0,0,0.8);
  width: 100%;
  opacity: 0;
  transition: 0.3s;
  padding: 10px;
}

.poster-container:hover .hover-info {
  opacity: 1;
}

.hover-info button {
  background: white;
  border: none;
  padding: 5px;
  cursor: pointer;
}

/* ARROWS */
.arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 40px;
  color: white;
  background: rgba(0,0,0,0.5);
  padding: 10px;
  cursor: pointer;
  opacity: 0;
  transition: 0.3s;
  z-index: 5;
}

.row-wrapper:hover .arrow {
  opacity: 1;
}

.arrow.left {
  left: 0;
}

.arrow.right {
  right: 0;
}

/* MODAL */
#modal {
  position: fixed;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
}

#modal iframe {
  width:80%;
  height:80%;
}
</style>
</head>

<body>

<header>
  <div class="logo">MovieFlix</div>
  <div class="controls">
    <select id="type">
      <option value="movie">Movies</option>
      <option value="tv">Series</option>
    </select>
    <input id="search" placeholder="Search">
  </div>
</header>

<div class="hero" id="hero"></div>
<div id="rows"></div>

<div id="modal" onclick="closeModal()">
  <iframe id="player"></iframe>
</div>

<script>
const API_KEY = "1d3ae144acfb6bfcb25f70361cedcf29";
const BASE = "https://api.themoviedb.org/3";

let type = "movie";

document.getElementById("type").addEventListener("change", (e)=>{
  type = e.target.value;
  loadAll();
});

/* HERO */
async function loadHero() {
  const res = await fetch(`${BASE}/trending/${type}/day?api_key=${API_KEY}`);
  const data = await res.json();
  const m = data.results[0];

  document.getElementById("hero").style.backgroundImage =
    `url(https://image.tmdb.org/t/p/original${m.backdrop_path})`;

  document.getElementById("hero").innerHTML = `
    <h1>${m.title || m.name}</h1>
    <button onclick="playTrailer(${m.id})">▶ Play</button>
  `;
}

/* CREATE ROW */
async function createRow(title, url, isTop10=false) {
  const res = await fetch(url);
  const data = await res.json();

  return `
    <div class="row">
      <h2>${title}</h2>

      <div class="row-wrapper">
        <div class="arrow left" onclick="scrollRow(this,-1)">❮</div>

        <div class="row-posters">
          ${data.results.slice(0,10).map((m,i)=>`
            <div class="poster-container">
              ${isTop10 ? `<div class="rank">${i+1}</div>` : ""}
              <img class="poster" src="https://image.tmdb.org/t/p/w300${m.poster_path}">
              <div class="hover-info">
                <p>${m.title || m.name}</p>
                <button onclick="playTrailer(${m.id})">▶</button>
              </div>
            </div>
          `).join("")}
        </div>

        <div class="arrow right" onclick="scrollRow(this,1)">❯</div>
      </div>
    </div>
  `;
}

/* LOAD ROWS */
async function loadRows() {
  const rows = document.getElementById("rows");

  const top10 = await createRow(
    "Top 10 Today",
    `${BASE}/trending/${type}/day?api_key=${API_KEY}`,
    true
  );

  const trending = await createRow(
    "Trending Today",
    `${BASE}/trending/${type}/day?api_key=${API_KEY}`
  );

  const topRated = await createRow(
    "Top Rated",
    `${BASE}/${type}/top_rated?api_key=${API_KEY}`
  );

  const comedy = await createRow(
    "Comedy",
    `${BASE}/discover/${type}?api_key=${API_KEY}&with_genres=35`
  );

  rows.innerHTML = top10 + trending + topRated + comedy;
}

/* SCROLL */
function scrollRow(el, direction) {
  const container = el.parentElement.querySelector(".row-posters");
  container.scrollBy({
    left: direction * 600,
    behavior: "smooth"
  });
}

/* TRAILER */
async function playTrailer(id) {
  const res = await fetch(`${BASE}/${type}/${id}/videos?api_key=${API_KEY}`);
  const data = await res.json();
  const t = data.results.find(v=>v.type==="Trailer");

  if (t) {
    document.getElementById("modal").style.display = "flex";
    document.getElementById("player").src =
      `https://www.youtube.com/embed/${t.key}?autoplay=1`;
  }
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
  document.getElementById("player").src = "";
}

/* SEARCH */
document.getElementById("search").addEventListener("input", async e=>{
  const q = e.target.value;

  if (!q) return loadRows();

  const res = await fetch(`${BASE}/search/${type}?api_key=${API_KEY}&query=${q}`);
  const data = await res.json();

  document.getElementById("rows").innerHTML = `
    <div class="row">
      <h2>Results</h2>
      <div class="row-posters">
        ${data.results.map(m=>`
          <div class="poster-container">
            <img class="poster" src="https://image.tmdb.org/t/p/w300${m.poster_path}">
            <div class="hover-info">
              <p>${m.title || m.name}</p>
              <button onclick="playTrailer(${m.id})">▶</button>
            </div>
          </div>
        `).join("")}
      </div>
    </div>
  `;
});

/* INIT */
async function loadAll() {
  await loadHero();
  await loadRows();
}

loadAll();
</script>

</body>
</html>
